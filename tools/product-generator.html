<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Engine | CaptionStudio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fafafa; --black: #000; --white: #fff; --grey: #64748b; --border: #e2e8f0; --accent: #ff4d00; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--bg); color: #0f172a; overflow-x: hidden; }

        /* Navigation */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 6%; background: #fff; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-family: 'Syne'; font-size: 1.3rem; font-weight: 800; color: #000; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .brand span { color: var(--accent); }
        .nav-links { display: flex; gap: 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-links a { color: var(--grey); text-decoration: none; transition: 0.2s; }
        .nav-links a:hover { color: #000; }

        .container { max-width: 500px; margin: auto; padding: 30px 15px; min-height: 80vh; }
        
        /* Intro Section */
        .intro-box { text-align: center; margin-bottom: 25px; }
        .intro-box h1 { font-family: 'Syne'; font-size: 2.2rem; letter-spacing: -1.5px; line-height: 1; margin-bottom: 10px; }
        .intro-box p { font-size: 14px; color: var(--grey); line-height: 1.5; padding: 0 10px; }

        /* Main Generator Card */
        .app-card { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        textarea { 
            width: 100%; padding: 18px; border: 1px solid #f1f5f9; border-radius: 18px; 
            font-family: inherit; font-size: 16px; resize: none; min-height: 120px; outline: none; background: #f8fafc;
            transition: 0.3s;
        }
        textarea:focus { background: #fff; border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.03); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        select, .btn { padding: 14px; border-radius: 14px; font-weight: 700; font-size: 14px; border: 1px solid var(--border); outline: none; font-family: inherit; }
        
        .btn-main { background: #000; color: #fff; grid-column: span 2; font-family: 'Syne'; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-remix { background: #fff; color: #000; border: 2px solid #000; cursor: pointer; }

        /* Results Display */
        #out { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .card { 
            background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 20px; 
            position: relative; animation: slideUp 0.4s ease; border-left: 4px solid #000;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
        
        .card-text { font-size: 15px; font-weight: 600; color: #1e293b; margin-bottom: 15px; line-height: 1.5; }
        .actions { display: flex; gap: 15px; }
        .action-btn { font-size: 11px; font-weight: 800; color: var(--grey); cursor: pointer; text-transform: uppercase; background: #f8fafc; padding: 6px 12px; border-radius: 8px; }
        .action-btn:hover { background: #000; color: #fff; }

        /* Saved Library */
        .saved-box { margin-top: 50px; padding-top: 30px; border-top: 2px dashed var(--border); }
        .saved-box h3 { font-family: 'Syne'; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .saved-item { 
            background: #fff; padding: 15px 45px 15px 15px; border-radius: 16px; 
            margin-bottom: 10px; font-size: 14px; border: 1px solid var(--border); position: relative; font-weight: 500;
        }
        .del-mark { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px; background: #fff1f2; color: #e11d48;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
        }

        /* Footer */
        footer { background: #fff; border-top: 1px solid var(--border); padding: 50px 15px; text-align: center; margin-top: 60px; }
        .footer-logo { font-family: 'Syne'; font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; display: block; color: #000; text-decoration: none; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 25px; }
        .footer-links a { color: var(--grey); font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer; }
        .footer-links a:hover { color: var(--accent); }
        .mail-btn { color: #000 !important; font-weight: 800 !important; border-bottom: 2px solid var(--accent); }

        /* Overlay Pages (Privacy, Terms, About) */
        .overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; 
            z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px;
        }
        .overlay-content { max-width: 600px; margin: auto; }
        .close-overlay { position: fixed; top: 20px; right: 20px; font-weight: 800; cursor: pointer; background: #000; color: #fff; padding: 10px 20px; border-radius: 100px; }
        .overlay h2 { font-family: 'Syne'; font-size: 2rem; margin-bottom: 20px; }
        .overlay p, .overlay li { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 15px; }
    </style>
</head>
<body>

<nav>
    <a href="../index.html" class="brand">Caption<span>Studio</span></a>
    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a onclick="showPage('about')">Agency</a>
    </div>
</nav>

<div class="container">
    <div class="intro-box">
        <h1>AI Pro Engine</h1>
        <p>Premium SaaS Content Generator by CaptionStudio. Gorakhpur's first AI agency suite.</p>
    </div>

    <div class="app-card">
        <textarea id="input" placeholder="Type: 'Nike shoes' or 'Digital Marketing Course'..."></textarea>
        
        <div class="controls">
            <select id="mode">
                <option value="desc">Story Description</option>
                <option value="seo">SEO Optimization</option>
                <option value="bullets">Key Highlights</option>
                <option value="ads">Viral Ad Copy</option>
            </select>
            <button class="btn btn-remix" onclick="generate(true)">Remix</button>
            <button class="btn btn-main" onclick="generate(false)">⚡ Generate Asset</button>
        </div>
    </div>

    <div id="out"></div>

    <div class="saved-box">
        <h3>⭐ Saved Library</h3>
        <div id="saved"></div>
    </div>
</div>

<footer>
    <a href="../index.html" class="footer-logo">CaptionStudio</a>
    <div class="footer-links">
        <a onclick="showPage('privacy')">Privacy Policy</a>
        <a onclick="showPage('terms')">Terms</a>
        <a href="mailto:captionstudio02@gmail.com" class="mail-btn">Contact Agency</a>
    </div>
    <p style="font-size: 11px; color: #94a3b8; font-weight: 700;">© 2026 CaptionStudio | Gorakhpur UP 53</p>
</footer>

<div id="pageOverlay" class="overlay">
    <div class="close-overlay" onclick="closePage()">Close ✕</div>
    <div class="overlay-content" id="overlayBody"></div>
</div>

<script>
    // Variation Engine
    const BRAIN = {
        starters: ["Unleash", "Elevate", "Redefine", "Experience", "Transform", "Master", "Ignite", "Discover"],
        power: ["Premium", "Revolutionary", "Advanced", "Seamless", "Elite", "Futuristic"],
        vibes: ["excellence", "pure comfort", "innovation", "superior style", "efficiency"]
    };

    function r(a) { return a[Math.floor(Math.random()*a.length)]; }

    function generate(isRemix) {
        let val = document.getElementById('input').value.trim();
        let mode = document.getElementById('mode').value;
        if(!val) return;
        let out = document.getElementById('out');
        if(!isRemix) out.innerHTML = ''; 

        for(let i=0; i<2; i++) {
            let text = "";
            let st = r(BRAIN.starters);
            if(mode==='desc') text = `${st} the future of ${val}. Our ${r(BRAIN.power)} tech ensures ${r(BRAIN.vibes)} in every move.`;
            if(mode==='seo') text = `${r(BRAIN.power)} ${val} | Best-in-class ${r(BRAIN.vibes)} | Official Site 2026.`;
            if(mode==='bullets') text = `• ${r(BRAIN.power)} Engineering\n• Optimized for ${r(BRAIN.vibes)}\n• ${st} Your Potential`;
            if(mode==='ads') text = `STOP LOOKING! 🚀 ${val} is here. ${st} your world today. Premium quality guaranteed.`;
            
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-text">${text.replace(/\n/g, '<br>')}</div>
                <div class="actions">
                    <span class="action-btn" onclick="copyText(this, \`${text}\`)">Copy</span>
                    <span class="action-btn" onclick="saveAsset(\`${text}\`)">Save</span>
                </div>`;
            if(isRemix) out.prepend(card); else out.appendChild(card);
            if(out.children.length > 3) out.removeChild(out.lastChild);
        }
    }

    // Page Handling Logic
    function showPage(type) {
        const body = document.getElementById('overlayBody');
        const overlay = document.getElementById('pageOverlay');
        let html = "";

        if(type === 'privacy') {
            html = `<h2>Privacy Policy</h2><p>At CaptionStudio, your privacy is our priority. We don't store your product ideas on our servers.</p><li>We use SEO verified encryption.</li><li>No login required for basic generation.</li><li>Cookies are only used for your 'Saved Library'.</li>`;
        } else if(type === 'terms') {
            html = `<h2>Terms & Conditions</h2><p>By using AI Pro Engine, you agree to:</p><li>Use the content responsibly.</li><li>CaptionStudio is not liable for AI-generated factual errors.</li><li>Commercial use is allowed for agency clients.</li>`;
        } else if(type === 'about') {
            html = `<h2>About CaptionStudio</h2><p>We are a Gorakhpur-based digital agency specializing in Frontend development and AI automation.</p><p><b>Founder:</b> BSc Math Graduate & Dev Expert.<br><b>Location:</b> Gorakhpur UP 53</p>`;
        }

        body.innerHTML = html;
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closePage() {
        document.getElementById('pageOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function copyText(btn, t) { navigator.clipboard.writeText(t); btn.innerText = "COPIED!"; setTimeout(()=>btn.innerText="COPY", 1000); }
    function saveAsset(t) {
        let s = JSON.parse(localStorage.getItem('cs_final_saved') || "[]");
        if(!s.includes(t)) { s.push(t); localStorage.setItem('cs_final_saved', JSON.stringify(s)); loadSaved(); }
    }
    function deleteSaved(i) {
        let s = JSON.parse(localStorage.getItem('cs_final_saved') || "[]");
        s.splice(i, 1); localStorage.setItem('cs_final_saved', JSON.stringify(s)); loadSaved();
    }
    function loadSaved() {
        let b = document.getElementById('saved');
        let d = JSON.parse(localStorage.getItem('cs_final_saved') || "[]");
        b.innerHTML = d.length === 0 ? '<p style="font-size:12px; color:#999;">Empty Library.</p>' : '';
        d.reverse().forEach((t, i) => {
            b.innerHTML += `<div class="saved-item">${t.replace(/\n/g, '<br>')} <span class="del-mark" onclick="deleteSaved(${d.length-1-i})">×</span></div>`;
        });
    }
    window.onload = loadSaved;
</script>
</body>
</html>
