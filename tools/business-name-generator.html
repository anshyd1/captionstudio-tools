<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Luxury Business Name Generator | AI-Powered Brand Ideas | CaptionStudio</title>
    <meta name="description" content="Generate 500+ premium Indian and Global business names. Professional brand name creator for startups, creative agencies, and luxury labels. Free & Secure.">
    <meta name="keywords" content="luxury brand names, indian startup name generator, modern business names, startup branding, CaptionStudio">
    <link rel="canonical" href="https://captionstudio.in/tools/business-name-generator.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text-main: #000000;
            --text-sub: #666666;
            --accent: #000000;
            --border: #ececec;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Nav - Professional Branding */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-family: 'Syne'; font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; text-decoration: none; color: #000; }
        .loc-tag { font-size: 13px; color: var(--text-sub); font-weight: 500; }

        /* Container */
        .wrapper { max-width: 900px; margin: 60px auto; padding: 0 5%; }

        .hero-title { text-align: center; margin-bottom: 40px; }
        .hero-title h1 { font-family: 'Syne'; font-size: 3rem; letter-spacing: -2px; margin-bottom: 10px; }
        .hero-title p { color: var(--text-sub); font-size: 1.1rem; }

        /* Tool Logic */
        .tool-box {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 40px;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 18px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            background: #f9f9f9;
        }
        input:focus { border-color: #000; background: #fff; }

        .btn-black {
            background: #000;
            color: #fff;
            padding: 0 35px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-black:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Tabs Section */
        .tabs-header { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab-trigger {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .tab-trigger.active { background: #000; color: #fff; border-color: #000; }

        /* Output Grid */
        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .name-card {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .name-card:hover { border-color: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .name-card .type-tag { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .copied-toast { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #28a745; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; display: none; }

        footer { text-align: center; padding: 60px 0; border-top: 1px solid var(--border); color: var(--text-sub); font-size: 14px; }

        @media (max-width: 768px) {
            .hero-title h1 { font-size: 2.2rem; }
            .input-group { flex-direction: column; }
            .btn-black { padding: 18px; }
            .names-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">CaptionStudio</a>
    <div class="loc-tag">Gorakhpur up 53</div>
</nav>

<div class="wrapper">
    <header class="hero-title">
        <h1>Brand Name Generator</h1>
        <p>Curated Luxury & Modern Indian Variations</p>
    </header>

    <div class="tool-box">
        <div class="input-group">
            <input type="text" id="nicheInput" placeholder="Niche (e.g. Media, Studio, Food, Tech)">
            <button class="btn-black" onclick="generateNames()">Generate Ideas</button>
        </div>

        <div class="tabs-header">
            <button class="tab-trigger active" onclick="switchType('indian', this)">Modern Indian</button>
            <button class="tab-trigger" onclick="switchType('global', this)">Global Elite</button>
        </div>

        <div id="results" class="names-grid">
            <div style="grid-column: 1/-1; text-align: center; color: #aaa; padding: 40px;">Enter your niche and click generate.</div>
        </div>
    </div>
</div>

<footer>
    © 2026 CaptionStudio | Professional Agency Tools | Verified Secure
</footer>

<script>
    let currentType = 'indian';
    
    // Handpicked Premium Database
    const database = {
        indian: {
            prefix: ["Veda", "Arya", "Advay", "Ojas", "Ishan", "Zaya", "Saan", "Daks", "Kyra", "Arva", "Yuv", "Tattva", "Indus", "Aura", "Prana"],
            suffix: ["ra", "tra", "ya", "is", "va", "am", "as", "an", "o", "ik"],
            luxuryPairs: ["Saffron", "Royal", "Vedica", "Dharma", "Kshatra", "Mantra", "Ananta"]
        },
        global: {
            prefix: ["Aether", "Luxe", "Vantage", "Omni", "Nova", "Stellar", "Zenith", "Apex", "Verv", "Koda", "Mura", "Haly", "Arco", "Vela", "Icon"],
            suffix: ["ix", "ora", "ify", "io", "ia", "um", "on", "ex", "us", "ly"],
            luxuryPairs: ["Elite", "Noir", "Studio", "Atelier", "Labs", "Bureau", "Collective"]
        }
    };

    function switchType(type, btn) {
        currentType = type;
        document.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(document.getElementById('nicheInput').value) generateNames();
    }

    function generateNames() {
        const niche = document.getElementById('nicheInput').value.trim();
        const results = document.getElementById('results');
        results.innerHTML = "";

        const data = database[currentType];
        let nameList = [];

        while(nameList.length < 8) {
            let name = "";
            let rand = Math.random();

            if (rand > 0.6) {
                // Style 1: Prefix + Suffix (Blend)
                name = data.prefix[Math.floor(Math.random()*data.prefix.length)] + data.suffix[Math.floor(Math.random()*data.suffix.length)];
            } else if (rand > 0.3 && niche) {
                // Style 2: Luxury Pair + Niche
                name = data.luxuryPairs[Math.floor(Math.random()*data.luxuryPairs.length)] + " " + niche;
            } else {
                // Style 3: Niche + Suffix
                name = (niche ? niche : data.prefix[Math.floor(Math.random()*data.prefix.length)]) + data.suffix[Math.floor(Math.random()*data.suffix.length)];
            }

            if(!nameList.includes(name)) nameList.push(name);
        }

        nameList.forEach(name => {
            const card = document.createElement('div');
            card.className = 'name-card';
            card.innerHTML = `
                <span class="copied-toast">Copied</span>
                <span class="type-tag">${currentType}</span>
                ${name}
            `;
            card.onclick = () => copyText(card, name);
            results.appendChild(card);
        });
    }

    function copyText(el, text) {
        navigator.clipboard.writeText(text);
        const toast = el.querySelector('.copied-toast');
        toast.style.display = 'block';
        el.style.borderColor = '#28a745';
        setTimeout(() => {
            toast.style.display = 'none';
            el.style.borderColor = '#ececec';
        }, 1200);
    }
</script>
</body>
</html>
