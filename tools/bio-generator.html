<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Bio Generator | Instagram, LinkedIn, Twitter | CaptionStudio</title>
<meta name="description" content="Create professional and creative bios for Instagram, LinkedIn, and Twitter instantly. Free and easy to use bio generator for creators.">
<link rel="canonical" href="https://captionstudio.in/tools/bio-generator.html">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#faf9f6;
--card:#fff;
--text:#0a0a0a;
--border:#eee;
--accent:#000;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
line-height: 1.5;
}

h1,h2,h3{font-family:'Syne'}

nav{
display:flex;
justify-content:space-between;
padding:15px 5%;
background:#fff;
border-bottom:1px solid var(--border);
}
nav a{text-decoration:none;color:#333;margin-left:15px;font-size:14px}

.container{
max-width:800px;
margin:40px auto;
padding:0 5%;
}

input, select{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid var(--border);
border-radius:8px;
background:#fff;
font-size:15px;
font-family:inherit;
outline:none;
}

.main-btn{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#000;
color:#fff;
font-weight:600;
cursor:pointer;
border-radius:8px;
transition:0.2s;
font-size:16px;
}

.main-btn:hover{ opacity:0.8; }

.actions{
display:flex;
gap:8px;
margin-top:10px;
}

.sub-btn{
flex:1;
padding:12px;
background:#f0f0f0;
color:#000;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.result{
background:var(--card);
padding:20px;
margin-top:15px;
border:1px solid var(--border);
border-radius:10px;
white-space: pre-line;
font-size:15px;
color:#333;
}

.copy-box{
display: flex;
justify-content: flex-end;
margin-top: 10px;
}

.copy{
padding:6px 12px;
font-size:12px;
background:#000;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

footer{
background:#000;
color:#fff;
text-align:center;
padding:30px;
margin-top:60px;
font-size:14px;
}

@media(max-width:600px){
h1{font-size:28px}
.container{margin:20px auto}
}
</style>
</head>

<body>

<nav>
<b>CaptionStudio</b>
<div>
<a href="../index.html">Home</a>
<a href="index.html">Tools</a>
</div>
</nav>

<div class="container">
<h1>Bio Generator</h1>
<p style="color:#666;margin-top:6px;">Generate creative bios for your social media profiles.</p>

<input id="name" type="text" placeholder="Your Name or Brand Name">
<input id="work" type="text" placeholder="Your Profession (e.g. Web Developer, Artist)">
<input id="extra" type="text" placeholder="Optional: Achievements or Location">

<select id="platform">
<option value="Instagram">Instagram (Creative & Emoji)</option>
<option value="LinkedIn">LinkedIn (Professional)</option>
<option value="Twitter">Twitter (Short & Punchy)</option>
</select>

<button class="main-btn" onclick="generate()">Generate Bios</button>

<div class="actions">
<button class="sub-btn" onclick="generate()">🔄 More</button>
<button class="sub-btn" onclick="clearAll()">❌ Clear</button>
</div>

<div id="results"></div>
</div>

<div class="container" style="border-top:1px solid #eee; padding-top:30px;">
<h2>Why use this Bio Generator?</h2>
<p>First impressions matter. Use our tool to create bios that stand out and tell your story in just a few lines.</p>
</div>

<footer>
© 2026 CaptionStudio | Free AI Tools
</footer>

<script>
function generate(){
    let name = document.getElementById('name').value.trim();
    let work = document.getElementById('work').value.trim();
    let extra = document.getElementById('extra').value.trim();
    let platform = document.getElementById('platform').value;
    let results = document.getElementById('results');

    if(!name || !work){
        alert("Please enter Name and Profession");
        return;
    }

    results.innerHTML = "<p style='text-align:center;padding:20px;'>Creating your bio...</p>";

    setTimeout(() => {
        let bios = [];
        
        if(platform === "LinkedIn"){
            bios = [
                `${name} | Professional ${work}${extra ? ' | ' + extra : ''}\nPassionate about creating impact and driving results. Let's connect!`,
                `${work} specialized in ${extra || 'delivering excellence'}.\nHelping businesses grow through strategic ${work} solutions.`,
                `Hi, I'm ${name}. A dedicated ${work} focused on ${extra || 'innovation'}.\nOpen to new opportunities and collaborations.`
            ];
        } else if(platform === "Instagram") {
            bios = [
                `${name} ✨\n📍 ${extra || 'Digital World'}\n🚀 ${work}\nBuilding dreams into reality.`,
                `${work} | ${name} 💼\n${extra || 'Work hard, stay humble'}\nDM for collaborations 📩`,
                `• ${name} •\n${work} 💯\n${extra ? extra + ' 📍' : 'Dreamer. Creator. Learner.'}\nCheck my latest work below 👇`
            ];
        } else { // Twitter/Default
            bios = [
                `${name} - Your friendly neighborhood ${work}. ${extra ? '| ' + extra : ''}`,
                `${work} | Constantly learning and building. ${name} here.`,
                `${name}: Doing ${work} things. ${extra || 'Stay tuned for updates.'}`
            ];
        }

        results.innerHTML = "";
        bios.forEach(text => {
            let div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
                <div>${text}</div>
                <div class="copy-box">
                    <button class="copy" onclick="copyText(this, \`${text.replace(/\n/g, '\\n')}\`)">Copy Bio</button>
                </div>
            `;
            results.appendChild(div);
        });
    }, 600);
}

function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        btn.innerText = "✓ Copied";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.innerText = "Copy Bio";
            btn.style.background = "#000";
        }, 1500);
    });
}

function clearAll(){
    document.getElementById('name').value = "";
    document.getElementById('work').value = "";
    document.getElementById('extra').value = "";
    document.getElementById('results').innerHTML = "";
}
</script>

</body>
</html>
