<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Reply Generator (Free & Instant) | CaptionStudio</title>
<meta name="description" content="Write professional email replies instantly. Paste any email and generate ready-to-send replies in seconds. Free, fast and easy to use.">
<link rel="canonical" href="https://captionstudio.in/tools/email-reply-generator.html">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#faf9f6;
--card:#fff;
--text:#0a0a0a;
--border:#eee;
--accent:#000; /* Premium Black & White */
}

/* reset */
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
line-height: 1.5;
}

h1,h2,h3{font-family:'Syne'}

/* nav */
nav{
display:flex;
justify-content:space-between;
padding:15px 5%;
background:#fff;
border-bottom:1px solid var(--border);
}
nav a{text-decoration:none;color:#333;margin-left:15px;font-size:14px}

/* container */
.container{
max-width:800px;
margin:40px auto;
padding:0 5%;
}

/* inputs */
textarea,select{
width:100%;
padding:14px;
margin-top:10px;
border:1px solid var(--border);
border-radius:8px;
background:#fff;
font-size:15px;
font-family:inherit;
outline:none;
}
textarea{height:150px;}

/* main button */
.main-btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
background:#000;
color:#fff;
font-weight:600;
cursor:pointer;
border-radius:8px;
transition:0.2s;
font-size:16px;
}

.main-btn:hover{
opacity:0.8;
}

/* action buttons */
.actions{
display:flex;
gap:8px;
margin-top:10px;
}

.actions .sub-btn{
flex:1;
padding:12px;
background:#f0f0f0;
color:#000;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* results */
.result{
background:var(--card);
padding:20px;
margin-top:15px;
border:1px solid var(--border);
border-radius:10px;
position:relative;
white-space: pre-line; /* Isse line breaks fix honge */
font-size:15px;
color:#333;
}

/* copy button FIX */
.copy-box{
display: flex;
justify-content: flex-end;
margin-top: 10px;
}

.copy{
padding:6px 12px;
font-size:12px;
background:#000;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

/* footer */
footer{
background:#000;
color:#fff;
text-align:center;
padding:30px;
margin-top:60px;
font-size:14px;
}

@media(max-width:600px){
h1{font-size:28px}
.container{margin:20px auto}
}
</style>
</head>

<body>

<nav>
<b>CaptionStudio</b>
<div>
<a href="../index.html">Home</a>
<a href="index.html">Tools</a>
</div>
</nav>

<div class="container">
<h1>Email Reply Generator</h1>
<p style="color:#666;margin-top:6px;">Paste received email and get instant replies.</p>

<textarea id="emailInput" placeholder="Paste the email you received here..."></textarea>

<select id="tone">
<option value="Professional">Professional</option>
<option value="Friendly">Friendly</option>
<option value="Formal">Formal</option>
</select>

<button class="main-btn" onclick="generate()">Generate Replies</button>

<div class="actions">
<button class="sub-btn" onclick="generate()">🔄 Regenerate</button>
<button class="sub-btn" onclick="clearAll()">❌ Clear</button>
</div>

<div id="results"></div>
</div>

<div class="container" style="border-top:1px solid #eee; padding-top:30px;">
<h2>How to use?</h2>
<p>Simply paste your received email, select a tone, and hit generate. You will get 3 different versions to choose from.</p>
</div>

<footer>
© 2026 CaptionStudio | Free AI Tools
</footer>

<script>
function generate(){
    let email = document.getElementById('emailInput').value.trim();
    let tone = document.getElementById('tone').value;
    let results = document.getElementById('results');

    if(!email){
        alert("Please paste an email first");
        return;
    }

    results.innerHTML = "<p style='text-align:center;padding:20px;'>Thinking...</p>";

    setTimeout(() => {
        const data = {
            "Professional": [
                "Hi,\n\nThank you for the email. I have received the information and will get back to you with an update soon.\n\nBest regards,\n[Your Name]",
                "Hello,\n\nI appreciate you reaching out. I am currently looking into this and will provide a response shortly.\n\nRegards,\n[Your Name]"
            ],
            "Friendly": [
                "Hey there!\n\nThanks for the heads up. I'll check this out right away and let you know. Talk soon!\n\nBest,\n[Your Name]",
                "Hi!\n\nGot your email, thanks! I'm on it and will ping you back once I have more details.\n\nCheers,\n[Your Name]"
            ],
            "Formal": [
                "Dear Sir/Madam,\n\nThis is to acknowledge the receipt of your email. I shall review the details and respond to you in due course.\n\nSincerely,\n[Your Name]",
                "To Whom It May Concern,\n\nThank you for your correspondence. Your request is being processed, and I will contact you with further information.\n\nRespectfully,\n[Your Name]"
            ]
        };

        results.innerHTML = "";
        let selectedReplies = data[tone];

        selectedReplies.forEach(text => {
            let div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
                <div>${text}</div>
                <div class="copy-box">
                    <button class="copy" onclick="copyText(this, \`${text.replace(/\n/g, '\\n')}\`)">Copy Reply</button>
                </div>
            `;
            results.appendChild(div);
        });
    }, 600);
}

function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        btn.innerText = "✓ Copied";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.innerText = "Copy Reply";
            btn.style.background = "#000";
        }, 1500);
    });
}

function clearAll(){
    document.getElementById('emailInput').value = "";
    document.getElementById('results').innerHTML = "";
}
</script>

</body>
</html>
